name: Weekly Journal Digest

on:
  schedule:
    - cron: "0 1 * * 1"
  workflow_dispatch:
    inputs:
      run_main:
        description: "Run journal_tracker.py (主程序)"
        type: boolean
        default: true
      run_zhaozichen:
        description: "Run zhaozichen.py (你的子程序)"
        type: boolean
        default: true

jobs:
  fetch-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install feedparser

      - name: Run tracker (main)
        if: github.event_name == 'schedule' || inputs.run_main == true
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_ALERT:     ${{ secrets.EMAIL_ALERT }}
        run: python journal_tracker.py

      - name: Run tracker (zhaozichen)
        if: github.event_name == 'schedule' || inputs.run_zhaozichen == true
        env:
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:  ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          EMAIL_ALERT:     ${{ secrets.EMAIL_ALERT }}
        run: python zhaozichen.py

      - name: Commit updated cache files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_articles.json seen_zhaozichen.json \
                  fail_counts_journal_tracker.json fail_counts_zhaozichen.json
          git diff --cached --quiet || git commit -m "chore: update seen articles [skip ci]"
          git push
